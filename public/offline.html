<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kein Internet – NuVio Taste</title>
    <meta name="theme-color" content="#0F0E0C" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0F0E0C;
        color: #e5e5e5;
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      .card {
        text-align: center;
        max-width: 320px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      .icon {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: #1a1a18;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon img { width: 40px; height: 40px; border-radius: 10px; }
      h1 {
        font-size: 1.125rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: #f5f5f5;
      }
      p {
        font-size: 0.875rem;
        color: #737373;
        line-height: 1.5;
      }
      button {
        margin-top: 0.5rem;
        padding: 0.625rem 1.5rem;
        border-radius: 12px;
        border: 1px solid #2a2a28;
        background: transparent;
        color: #a3a3a3;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }
      button:hover { background: #1a1a18; color: #e5e5e5; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">
        <img src="/icon-192.png" alt="NuVio Taste" />
      </div>
      <h1>Keine Internetverbindung</h1>
      <p>
        Überprüfe deine Verbindung und versuche es erneut.<br />
        Gespeicherte Rezepte sind weiterhin verfügbar.
      </p>
      <button onclick="location.reload()">Erneut versuchen</button>
    </div>
  </body>
</html>
